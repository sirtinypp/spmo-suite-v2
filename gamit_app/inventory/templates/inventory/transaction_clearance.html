{% extends 'layout.html' %}

{% block content %}
<div class="container-fluid fade-in">
    <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-2">
        <h2 class="h4 fw-bold text-dark mb-0">
            <i class="fas fa-stamp text-success me-2"></i>Property Clearance
        </h2>
        <a href="{% url 'transaction_history' %}" class="btn btn-outline-secondary btn-sm">Cancel</a>
    </div>

    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card border-0 shadow-sm border-success border-top border-3">
                <div class="card-header bg-white py-3">
                    <h5 class="fw-bold m-0 text-dark">Clearance Request</h5>
                </div>
                <div class="card-body p-4">
                    <form method="post" enctype="multipart/form-data">
                        {% csrf_token %}
                        <div class="alert alert-success small border-0 bg-light text-muted mb-4">
                            <i class="fas fa-info-circle me-2"></i>
                            Request a property clearance from SPMO. Required for resignation, retirement, or transfer.
                        </div>
                        <div class="mb-4">
                            <label class="form-label small fw-bold text-muted">Purpose of Clearance</label>
                            {{ form.purpose }}
                        </div>
                        <div class="mb-4">
                            <label class="form-label small fw-bold text-muted">Employee Routing / Clearance Form</label>
                            {{ form.routing_form }}
                        </div>
                        <hr class="my-4">
                        <button type="submit" class="btn btn-success w-100 fw-bold py-2">
                            <i class="fas fa-paper-plane me-2"></i>Submit Clearance Request
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

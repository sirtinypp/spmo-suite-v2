{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAMIT System - Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="{% static 'inventory/img/favicon.png' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body {
            background-color: #f1f5f9;
            font-family: 'Inter', sans-serif;
            color: #334155;
        }

        /* Override primary with GAMIT Blue */
        .text-primary {
            color: #3b82f6 !important;
        }

        .btn-primary {
            background-color: #3b82f6 !important;
            border-color: #3b82f6 !important;
        }

        .btn-primary:hover {
            background-color: #2563eb !important;
            border-color: #2563eb !important;
        }
    </style>
</head>

<body>



    <div class="container py-5 mt-5">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">

                <div class="text-center mb-5">
                    <img src="{% static 'inventory/logo.png' %}" alt="UP Logo" class="img-fluid mb-3"
                        style="height: 100px;">
                    <h1 class="display-3 fw-bold text-primary mb-3" style="letter-spacing: -2px; font-weight: 800;">
                        GAMIT</h1>
                    <p class="text-secondary fw-medium text-uppercase px-4"
                        style="font-size: 0.85rem; letter-spacing: 1px; line-height: 1.8;">
                        <span class="text-primary fw-bolder fs-5">G</span>overnment
                        <span class="text-primary fw-bolder fs-5">A</span>sset
                        <span class="text-primary fw-bolder fs-5">M</span>anagement and
                        <span class="text-primary fw-bolder fs-5">I</span>nventory
                        <span class="text-primary fw-bolder fs-5">T</span>racking
                    </p>
                    <hr class="w-25 mx-auto my-4 text-primary opacity-25">
                </div>

                <div class="card shadow-lg border-0 rounded-4 overflow-hidden">
                    <div class="card-body p-4 p-md-5">

                        <form method="post" action="{% url 'login' %}">
                            {% csrf_token %}
                            {% if next %}
                            <input type="hidden" name="next" value="{{ next }}">
                            {% endif %}

                            {% if form.errors %}
                            <div
                                class="alert alert-danger border-0 bg-danger-subtle text-danger rounded-3 small mb-4 d-flex align-items-center">
                                <i class="fa-solid fa-circle-exclamation me-2"></i>
                                <div>Invalid username or password</div>
                            </div>
                            {% endif %}

                            <div class="mb-3">
                                <label class="form-label small fw-bold text-muted text-uppercase"
                                    style="font-size: 0.75rem; letter-spacing: 0.5px;">Username</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-0 text-muted ps-3"><i
                                            class="fas fa-user"></i></span>
                                    <input type="text" name="username" class="form-control bg-light border-0 py-2"
                                        placeholder="Enter your username" required autofocus>
                                </div>
                            </div>

                            <div class="mb-4">
                                <label class="form-label small fw-bold text-muted text-uppercase"
                                    style="font-size: 0.75rem; letter-spacing: 0.5px;">Password</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-0 text-muted ps-3"><i
                                            class="fas fa-lock"></i></span>
                                    <input type="password" name="password" class="form-control bg-light border-0 py-2"
                                        placeholder="••••••••" required>
                                </div>
                            </div>

                            <div class="d-grid gap-2 mt-4">
                                <button type="submit" class="btn btn-primary fw-bold py-2 shadow-sm">
                                    Sign In <i class="fas fa-arrow-right ms-1"></i>
                                </button>
                            </div>
                        </form>

                    </div>

                    <div class="px-4 px-md-5 pb-4">
                        <div class="d-flex align-items-center my-3">
                            <hr class="flex-grow-1"><span class="mx-2 text-muted small">or</span>
                            <hr class="flex-grow-1">
                        </div>
                        <a href="/sso/google/login/?process=login"
                            class="btn btn-outline-secondary w-100 py-2 d-flex align-items-center justify-content-center gap-2">
                            <svg width="16" height="16" viewBox="0 0 24 24">
                                <path fill="#4285F4"
                                    d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" />
                                <path fill="#34A853"
                                    d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                                <path fill="#FBBC05"
                                    d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
                                <path fill="#EA4335"
                                    d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
                            </svg>
                            Sign in with Google
                        </a>
                    </div>

                    <div class="card-footer bg-light border-0 text-center py-3">
                        <small class="text-muted">
                            Forgot password? <a href="#" class="text-decoration-none fw-bold text-primary">Contact
                                Admin</a>
                        </small>
                    </div>
                </div>

                <div class="text-center mt-4">
                    <small class="text-muted opacity-50">System SSPMO | GAMIT &copy; {% now "Y" %}</small>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>

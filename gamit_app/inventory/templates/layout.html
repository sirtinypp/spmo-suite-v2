<!DOCTYPE html>
<html lang="en" data-bs-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAMIT System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    {% load static %}
    <link rel="icon" type="image/png" href="{% static 'inventory/img/favicon.png' %}">

    <script>
        const storedTheme = localStorage.getItem('theme');
        if (storedTheme) {
            document.documentElement.setAttribute('data-bs-theme', storedTheme);
        }
    </script>

    <style>
        :root {
            /* Common Dimensions */
            --sidebar-width: 260px;

            /* Light Mode (Default) Variables */
            --sidebar-bg: #0f172a;
            /* Deep midnight blue */
            --sidebar-text: #94a3b8;
            /* Soft blue-grey */
            --sidebar-hover: rgba(255, 255, 255, 0.05);
            --primary-accent: #3b82f6;
            /* Modern bright blue */
            --bg-body: #f1f5f9;
            /* Very light grey/blue tint */
            --text-main: #334155;
            --text-muted: #64748b;
            /* Muted text in light mode */
        }

        /* --- Dark Mode Overrides (Enhanced Visibility) --- */
        [data-bs-theme="dark"] {
            --bg-body: #020617;
            /* Very dark main background (Slate 950) */
            --sidebar-bg: #0f172a;
            /* Fixed Dark Sidebar */
            --text-main: #e2e8f0;
            /* Light text for dark mode (Slate 200) */
            --text-muted: #94a3b8;
            /* Muted text in dark mode (Slate 400) */
        }

        body {
            background-color: var(--bg-body);
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* --- Collapsible Submenu Styling (Restored) --- */
        .sidebar-accordion {
            background: transparent;
            border: none;
        }

        .sidebar-accordion .accordion-item {
            background: transparent;
            border: none;
            margin-bottom: 2px;
        }

        .sidebar-accordion .accordion-button {
            background: transparent;
            color: var(--sidebar-text);
            padding: 10px 16px;
            box-shadow: none;
            font-size: 0.95rem;
            font-weight: 500;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .sidebar-accordion .accordion-button:not(.collapsed) {
            color: #fff;
            background: rgba(255, 255, 255, 0.05);
        }

        .sidebar-accordion .accordion-button:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.05);
        }

        .sidebar-accordion .accordion-button::after {
            filter: invert(0.8) sepia(0) saturate(1) hue-rotate(0deg) brightness(1.2);
            transform: scale(0.8);
        }

        .sub-menu {
            list-style: none;
            padding-left: 0;
            margin-top: 4px;
            margin-bottom: 4px;
        }

        .sub-link {
            display: flex;
            align-items: center;
            padding: 8px 16px 8px 46px;
            /* indent past the icon */
            color: var(--sidebar-text);
            text-decoration: none;
            font-size: 0.85rem;
            border-radius: 6px;
            transition: all 0.2s;
            position: relative;
        }

        .sub-link::before {
            content: '';
            position: absolute;
            left: 26px;
            top: 50%;
            width: 4px;
            height: 4px;
            background-color: var(--sidebar-text);
            border-radius: 50%;
            transform: translateY(-50%);
            opacity: 0.5;
        }

        .sub-link:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.03);
        }

        .sub-link:hover::before {
            background-color: var(--primary-accent);
            opacity: 1;
        }

        .sub-link.active {
            color: var(--primary-accent);
            font-weight: 600;
        }

        .sub-link.active::before {
            background-color: var(--primary-accent);
            opacity: 1;
            box-shadow: 0 0 6px var(--primary-accent);
        }
        .sidebar {
            position: fixed;
            top: 0;
            bottom: 0;
            left: 0;
            width: var(--sidebar-width);
            z-index: 1000;
            padding: 24px 16px;
            background-color: var(--sidebar-bg);
            display: flex;
            flex-direction: column;
            box-shadow: 4px 0 24px rgba(0, 0, 0, 0.1);
            border-right: 1px solid rgba(255, 255, 255, 0.02);
        }

        .sidebar-brand {
            color: #fff;
            padding: 0 12px 24px 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 16px;
        }

        /* Navigation Links */
        .nav-link {
            color: var(--sidebar-text);
            margin-bottom: 4px;
            padding: 10px 16px;
            border-radius: 8px;
            font-weight: 500;
            font-size: 0.95rem;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
        }

        .nav-link i {
            width: 24px;
            text-align: center;
            margin-right: 12px;
            font-size: 1.1em;
            opacity: 0.7;
            transition: opacity 0.2s;
        }

        /* Hover State */
        .nav-link:hover {
            color: #fff;
            background: var(--sidebar-hover);
            transform: translateX(4px);
        }

        .nav-link:hover i {
            opacity: 1;
        }

        /* Active State */
        .nav-link.active {
            background-color: var(--primary-accent);
            color: white;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        .nav-link.active i {
            opacity: 1;
        }

        /* --- Sidebar Styling --- */

        /* Hide unnecessary styles if they exist elsewhere */


        /* --- Main Content --- */
        .main-content {
            margin-left: var(--sidebar-width);
            min-height: 100vh;
            padding: 32px;
            transition: margin-left 0.3s ease;
        }

        /* Utility */
        .section-label {
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            font-weight: 700;
            margin-top: 24px;
            margin-bottom: 8px;
            padding-left: 12px;
        }

        .fade-in {
            animation: fadeIn 0.4s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Theme Toggle Button Styling */
        .theme-toggle-btn {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: var(--sidebar-text);
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .theme-toggle-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
        }
    </style>
</head>

<body>
    <!-- Thin top progress bar (filter/search navigation only) -->
    <div id="sspmo-topbar" style="position:fixed;top:0;left:0;height:3px;width:0%;background:#7b1113;z-index:999999;opacity:0;transition:width 0.4s ease;"></div>

    <!-- SSPMO Branded Loader -->
    <div id="sspmo-loader"
        style="position:fixed;inset:0;z-index:99999;background:#fff;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;transition:opacity .4s ease;">
        <img src="{% static 'inventory/img/logo.png' %}" alt="UP" style="width:60px;height:60px;object-fit:contain;">
        <span
            style="font-family:'Inter',sans-serif;font-weight:700;font-size:22px;color:#7b1113;letter-spacing:-0.5px;">SSPMO</span>
        <span
            style="font-family:'Inter',sans-serif;font-weight:500;font-size:10px;color:#64748b;text-transform:uppercase;letter-spacing:3px;text-align:center;">System
            Supply &amp; Property Management Office</span>
        <div
            style="margin-top:12px;width:28px;height:28px;border:3px solid #e2e8f0;border-top-color:#7b1113;border-radius:50%;animation:sspmo-spin .7s linear infinite;">
        </div>
    </div>
    <style>
        @keyframes sspmo-spin {
            to {
                transform: rotate(360deg)
            }
        }
    </style>
    <script>!function () { var s = Date.now(), h = function () { if (window.suppressSspmoLoader) return; var e = Date.now() - s, w = Math.max(0, 1000 - e), l = document.getElementById('sspmo-loader'); if (l && l.style.display !== 'none') setTimeout(function () { l.style.opacity = '0'; setTimeout(function () { l.style.display = 'none' }, 400) }, w) }; window.addEventListener('DOMContentLoaded', h); window.addEventListener('load', h); setTimeout(h, 5000); }();</script>

    {% include 'inventory/snippets/sidebar_nav.html' with show_theme_toggle=True %}

    <main class="main-content">
        <div class="fade-in">
            {% block content %}
            {% endblock %}
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // Tooltip Initialization
        var tooltipTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="tooltip"]'))
        var tooltipList = tooltipTriggerList.map(function (tooltipTriggerEl) {
            return new bootstrap.Tooltip(tooltipTriggerEl)
        })

        // Theme Toggle Logic
        const toggleBtn = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');
        const htmlElement = document.documentElement;

        const setIcon = (theme) => {
            if (theme === 'dark') {
                themeIcon.classList.remove('fa-moon');
                themeIcon.classList.add('fa-sun');
            } else {
                themeIcon.classList.remove('fa-sun');
                themeIcon.classList.add('fa-moon');
            }
        }

        const currentTheme = htmlElement.getAttribute('data-bs-theme');
        setIcon(currentTheme);

        toggleBtn.addEventListener('click', () => {
            const activeTheme = htmlElement.getAttribute('data-bs-theme');
            const newTheme = activeTheme === 'dark' ? 'light' : 'dark';

            htmlElement.setAttribute('data-bs-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            setIcon(newTheme);
        });
    </script>

    {% block extra_scripts %}{% endblock %}
</body>

</html>

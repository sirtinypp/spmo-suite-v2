<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In Error | GAMIT</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light d-flex align-items-center justify-content-center" style="height: 100vh;">
    <div class="card shadow border-0" style="max-width: 400px; width: 100%; padding: 2rem; border-radius: 10px;">
        <div class="text-center mb-3">
            <div class="d-inline-flex align-items-center justify-content-center bg-danger bg-opacity-10 rounded-circle"
                style="width: 64px; height: 64px;">
                <svg class="text-danger" xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="currentColor"
                    viewBox="0 0 16 16">
                    <path
                        d="M8.982 1.566a1.13 1.13 0 0 0-1.96 0L.165 13.233c-.457.778.091 1.767.98 1.767h13.713c.889 0 1.438-.99.98-1.767L8.982 1.566zM8 5c.535 0 .954.462.9.995l-.35 3.507a.552.552 0 0 1-1.1 0L7.1 5.995A.905.905 0 0 1 8 5zm.002 6a1 1 0 1 1 0 2 1 1 0 0 1 0-2z" />
                </svg>
            </div>
        </div>
        <h4 class="fw-bold text-center mb-2">Access Denied</h4>
        <p class="text-muted text-center small mb-1">{{ error }}</p>
        {% if email %}
        <p class="text-center small text-secondary mb-3">Attempted with: {{ email }}</p>
        {% endif %}
        <a href="/login/" class="btn btn-primary w-100 py-2">← Back to Sign In</a>
    </div>
</body>

</html>

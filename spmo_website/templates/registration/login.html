<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | UP SSPMO Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.6);
        }
    </style>
</head>

<body class="bg-slate-50 text-slate-800 min-h-screen flex items-center justify-center relative overflow-hidden">

    <div class="absolute inset-0 z-0">
        <div class="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] opacity-40">
        </div>
        <div class="absolute right-0 top-0 w-1/2 h-full bg-gradient-to-l from-red-50 to-transparent"></div>
    </div>

    <div class="relative z-10 w-full max-w-sm px-4">

        <div class="text-center mb-8">
            <div
                class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-red-900 text-white shadow-lg ring-4 ring-red-50 mb-4">
                <span class="font-serif font-bold text-2xl">UP</span>
            </div>
            <h1 class="text-xl font-extrabold text-slate-900 tracking-tight">SSPMO <span
                    class="text-red-900">PORTAL</span></h1>
            <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest mt-1">Authorized Access Only</p>
        </div>

        <div class="glass-card rounded-2xl shadow-xl p-8">

            {% if form.errors %}
            <div class="mb-4 p-3 bg-red-50 border border-red-100 rounded text-xs text-red-700 flex items-center gap-2">
                <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg>
                <span>Invalid credentials.</span>
            </div>
            {% endif %}

            <form method="post">
                {% csrf_token %}

                <div class="mb-4">
                    <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Username</label>
                    <input type="text" name="username" autofocus required
                        class="block w-full px-3 py-2 border border-slate-300 rounded-lg text-sm focus:outline-none focus:border-red-900 focus:ring-1 focus:ring-red-900"
                        placeholder="Enter ID">
                </div>

                <div class="mb-6">
                    <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Password</label>
                    <input type="password" name="password" required
                        class="block w-full px-3 py-2 border border-slate-300 rounded-lg text-sm focus:outline-none focus:border-red-900 focus:ring-1 focus:ring-red-900"
                        placeholder="••••••••">
                </div>

                <button type="submit"
                    class="w-full bg-red-900 hover:bg-red-800 text-white font-bold py-2.5 rounded-lg shadow-lg shadow-red-900/20 transition-transform active:scale-95 text-xs uppercase tracking-wide">
                    Secure Sign In
                </button>
            </form>

            <div class="mt-6 text-center">
                <div class="relative mb-4">
                    <div class="absolute inset-0 flex items-center">
                        <div class="w-full border-t border-slate-200"></div>
                    </div>
                    <div class="relative flex justify-center text-xs">
                        <span class="bg-white px-3 text-slate-400 uppercase tracking-wide font-medium">or</span>
                    </div>
                </div>

                <a href="/sso/google/login/?process=login"
                    class="flex items-center justify-center gap-2 w-full border border-slate-300 hover:border-slate-400 bg-white hover:bg-slate-50 text-slate-700 font-medium py-2.5 rounded-lg transition text-xs">
                    <svg class="w-4 h-4" viewBox="0 0 24 24">
                        <path fill="#4285F4"
                            d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" />
                        <path fill="#34A853"
                            d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                        <path fill="#FBBC05"
                            d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
                        <path fill="#EA4335"
                            d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
                    </svg>
                    Sign in with Google
                </a>
            </div>

            <div class="mt-4 text-center">
                <a href="/" class="text-xs font-medium text-slate-400 hover:text-red-900 transition">← Return to Public
                    Site</a>
            </div>
        </div>
    </div>
</body>

</html>

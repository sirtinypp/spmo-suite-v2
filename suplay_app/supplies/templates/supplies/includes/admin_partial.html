<!-- Admin Header (Stretched Partial) -->
<header class="d-flex align-items-center justify-content-between mb-5">
    <div class="flex-grow-1">
        {% block header_title %}
        <div class="d-flex align-items-center">
            <div class="bg-success-subtle p-2 rounded-3 me-3" style="background-color: rgba(5, 150, 105, 0.1);">
                <i class="bi bi-speedometer2 fs-4 text-success"></i>
            </div>
            <div>
                <span class="text-dark d-block fw-bold h4 mb-0">Command Center</span>
                <span class="text-muted small fw-medium" style="font-size: 0.75rem;">
                    <i class="bi bi-calendar3 me-1"></i> {% now "F d, Y" %}
                </span>
            </div>
        </div>
        {% endblock %}
    </div>
    
    <div class="d-flex align-items-center gap-3 ms-4 ps-4 border-start" style="border-color: #e2e8f0 !important;">
        <div class="text-end d-none d-md-block">
            <div class="fw-bold text-dark" style="font-size: 0.85rem;">{{ user.get_full_name|default:user.username }}</div>
            <div class="text-muted fw-medium text-uppercase" style="font-size: 9px; letter-spacing: 0.05em;">{{ user.profile.get_role_display|default:"System Admin" }}</div>
        </div>
        <div class="bg-white p-1 rounded-circle shadow-sm border" style="width: 42px; height: 42px; display: flex; align-items: center; justify-content: center;">
            <i class="bi bi-person-fill fs-4 text-success opacity-75"></i>
        </div>
    </div>
</header>

{% block admin_content %}{% endblock %}

{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Entry | SUPLAY</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root {
            --bg-deep: #03040b;
            --accent-teal: #0d9488;
            --accent-emerald: #059669;
            --glass-white: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-deep);
            background-image: 
                radial-gradient(at 0% 0%, rgba(13, 148, 136, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(5, 150, 105, 0.1) 0px, transparent 50%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated Background Elements */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.5;
            animation: orb-float 20s infinite alternate;
        }
        .orb-1 { width: 400px; height: 400px; background: var(--accent-teal); top: -100px; left: -100px; }
        .orb-2 { width: 300px; height: 300px; background: var(--accent-emerald); bottom: -50px; right: -50px; animation-delay: -5s; }

        @keyframes orb-float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(30px, 50px) scale(1.1); }
        }

        .login-container {
            width: 100%;
            max-width: 480px;
            padding: 2rem;
            position: relative;
            z-index: 10;
        }

        .glass-card {
            background: var(--glass-white);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 3rem 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .logo-section {
            text-align: center;
            margin-bottom: 3rem;
        }

        .logo-section img {
            width: 100px;
            height: 100px;
            margin-bottom: 1.5rem;
            filter: drop-shadow(0 0 20px rgba(13, 148, 136, 0.3));
        }

        .brand-title {
            font-size: 2.25rem;
            font-weight: 800;
            letter-spacing: -1.5px;
            background: linear-gradient(to bottom, #fff 40%, rgba(255,255,255,0.6));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .brand-subtitle {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
            letter-spacing: 0.2em;
            font-weight: 600;
        }

        .auth-actions {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .btn-sso {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: #fff;
            color: #000;
            text-decoration: none;
            padding: 1rem;
            border-radius: 16px;
            font-weight: 700;
            font-size: 0.95rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: none;
        }

        .btn-sso:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2), 0 0 0 4px rgba(255, 255, 255, 0.1);
        }

        .btn-sso svg { width: 20px; height: 20px; }

        .divider {
            display: flex;
            align-items: center;
            margin: 2rem 0;
            color: rgba(255, 255, 255, 0.2);
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--glass-border);
        }

        .divider span { padding: 0 1.5rem; font-weight: 700; }

        .btn-admin {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            padding: 1rem;
            border-radius: 16px;
            font-weight: 600;
            font-size: 0.85rem;
            border: 1px solid var(--glass-border);
            transition: all 0.3s;
        }

        .btn-admin:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border-color: rgba(255, 255, 255, 0.2);
        }

        .footer {
            margin-top: 2.5rem;
            text-align: center;
            font-size: 0.65rem;
            color: rgba(255, 255, 255, 0.3);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .acronym-box {
            margin-top: 2rem;
            padding: 1rem;
            background: rgba(13, 148, 136, 0.05);
            border-radius: 12px;
            font-size: 0.7rem;
            color: rgba(13, 148, 136, 0.8);
            line-height: 1.6;
            text-align: center;
        }
        
        .acronym-box span { color: #fff; font-weight: 700; }

        @media (max-width: 480px) {
            .glass-card { padding: 2rem 1.5rem; }
            .brand-title { font-size: 1.8rem; }
        }
    </style>
</head>
<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="login-container">
        <div class="glass-card">
            <div class="logo-section">
                <img src="{% static 'logo.png' %}" alt="UP Seal">
                <h1 class="brand-title">SUPLAY</h1>
                <p class="brand-subtitle">Asset Distribution Control</p>
            </div>

            <div class="auth-actions">
                <a href="/sso/google/login/?process=login" class="btn-sso">
                    <svg viewBox="0 0 24 24">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" />
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
                    </svg>
                    Continue with UP Mail
                </a>

                <div class="divider"><span>OR SECURE CHANNEL</span></div>

                <a href="/admin/login/?next=/console/" class="btn-admin">
                    <i class="bi bi-shield-lock"></i>
                    System Administrator Access
                </a>
            </div>

            <div class="acronym-box">
                <span>S</span>ustainable supply <span>U</span>tilization, 
                <span>P</span>urchasing, <span>L</span>ogistics, <span>A</span>ssets 
                and <span>Y</span>ield assessment
            </div>

            <div class="footer">
                v2.0 &bull; &copy; {% now "Y" %} SSPMO-UP
            </div>
        </div>
    </div>
</body>
</html>
